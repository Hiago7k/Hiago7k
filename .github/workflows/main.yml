name: generate animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: Hiago7k
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=8A2BE2&color_dots=%231a1b27,%23302b63,%238A2BE2,%23c77dff,%23ffffff

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
